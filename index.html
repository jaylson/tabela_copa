<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa do Mundo 2026 — Tracker & Simulador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05050F;
      --surface: #0C0C1F;
      --card: #111128;
      --gold: #FFD700;
      --gold2: #FFE566;
      --cyan: #00E5FF;
      --green: #00C851;
      --red: #FF4444;
      --muted: #7A7A9D;
      --text: #E8E8FF;
      --border: rgba(255,255,255,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(255,215,0,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(0,20,80,0.45) 0%, transparent 60%),
        linear-gradient(135deg, rgba(0,5,30,0.6) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    #root { position: relative; z-index: 1; }

    /* ===== HEADER ===== */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(5,5,15,0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1440px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; gap: 16px;
    }
    .logo {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px; color: var(--gold); letter-spacing: 2px;
      white-space: nowrap; text-shadow: 0 0 24px rgba(255,215,0,0.45);
      flex-shrink: 0;
    }
    .header-badges { display: flex; gap: 8px; flex-shrink: 0; }
    .badge {
      background: rgba(255,215,0,0.10);
      border: 1px solid rgba(255,215,0,0.30);
      color: var(--gold);
      font-family: 'Bebas Neue', cursive;
      font-size: 12px; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 4px;
    }
    .nav { display: flex; }
    .nav-btn {
      background: none; border: none;
      color: var(--muted);
      font-family: 'Bebas Neue', cursive;
      font-size: 15px; letter-spacing: 1px;
      padding: 0 16px; height: 64px;
      cursor: pointer; transition: color 0.2s;
      position: relative; white-space: nowrap;
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn.active::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 3px;
      background: var(--gold); border-radius: 2px 2px 0 0;
    }
    .nav-btn:hover:not(.active) { color: var(--text); }

    /* ===== MAIN ===== */
    .main { max-width: 1440px; margin: 0 auto; padding: 80px 20px 48px; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 26px; letter-spacing: 2px;
      color: var(--text); margin-bottom: 20px;
    }
    .section-title span { color: var(--gold); }

    /* ===== CONTROLS BAR ===== */
    .controls-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      flex-wrap: wrap; margin-bottom: 20px;
    }
    .controls-left { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      font-family: 'Bebas Neue', cursive;
      font-size: 14px; letter-spacing: 1px;
      padding: 9px 18px; border-radius: 8px;
      border: none; cursor: pointer; transition: all 0.2s;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,215,0,0.3); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--red); color: var(--red); }
    .counter-text { font-size: 14px; color: var(--muted); }
    .counter-text span { color: var(--gold); font-weight: 700; }

    /* ===== GROUPS GRID ===== */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    @media (max-width: 1280px) { .groups-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 960px)  { .groups-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px)  {
      .groups-grid { grid-template-columns: 1fr; }
      .header-badges { display: none; }
      .nav-btn { padding: 0 10px; font-size: 12px; }
      .logo { font-size: 22px; }
    }

    /* ===== GROUP CARD ===== */
    .group-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .group-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .group-card-header {
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .group-letter {
      font-family: 'Bebas Neue', cursive;
      font-size: 32px; line-height: 1;
    }
    .brazil-badge {
      font-family: 'Bebas Neue', cursive;
      font-size: 10px; letter-spacing: 1px;
      padding: 3px 8px; border-radius: 4px;
      background: rgba(0,200,81,0.18);
      border: 1px solid var(--green);
      color: var(--green);
    }

    /* ===== STANDINGS TABLE ===== */
    .standings-table { width: 100%; border-collapse: collapse; }
    .standings-table th {
      font-family: 'Bebas Neue', cursive;
      font-size: 10px; letter-spacing: 1px;
      color: var(--muted); text-align: center;
      padding: 5px 4px;
      border-bottom: 1px solid var(--border);
    }
    .standings-table th:nth-child(2) { text-align: left; padding-left: 6px; }
    .standings-table td {
      text-align: center; padding: 6px 4px;
      font-size: 13px; font-weight: 600; border: none;
    }
    .standings-table td:nth-child(2) { text-align: left; padding-left: 6px; }
    .standings-table tr.classified { background: rgba(0,200,81,0.05); }
    .standings-table tr.classified td:first-child { color: var(--green); font-weight: 700; }
    .divider-row td { border-bottom: 2px dashed rgba(0,200,81,0.35) !important; padding-bottom: 8px; }
    .team-cell { display: flex; align-items: center; gap: 5px; }
    .flag { font-size: 15px; line-height: 1; flex-shrink: 0; }
    .team-name {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px;
    }

    /* ===== MATCHES PANEL ===== */
    .matches-toggle {
      width: 100%; background: none; border: none;
      border-top: 1px solid var(--border);
      color: var(--muted); font-family: 'Rajdhani', sans-serif;
      font-size: 11px; font-weight: 600; letter-spacing: 1px;
      padding: 7px 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      transition: color 0.2s;
    }
    .matches-toggle:hover { color: var(--text); }
    .matches-panel { padding: 6px 8px; border-top: 1px solid var(--border); }
    .match-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 4px 6px; border-radius: 6px;
      font-size: 11px; gap: 4px;
    }
    .match-row:hover { background: rgba(255,255,255,0.04); }
    .match-team { display: flex; align-items: center; gap: 4px; font-weight: 600; flex: 1; }
    .match-team.right { flex-direction: row-reverse; text-align: right; }
    .match-score {
      font-family: 'Bebas Neue', cursive; font-size: 15px;
      min-width: 38px; text-align: center; color: var(--gold);
    }
    .match-score.pending { color: var(--muted); font-size: 11px; font-family: 'Rajdhani', sans-serif; font-weight: 600; }

    /* ===== CALENDAR ===== */
    .date-header {
      font-family: 'Bebas Neue', cursive;
      font-size: 18px; color: var(--gold);
      letter-spacing: 2px; margin: 22px 0 10px;
      padding-bottom: 7px; border-bottom: 1px solid var(--border);
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 900px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 580px) { .calendar-grid { grid-template-columns: 1fr; } }
    .cal-card {
      background: var(--card);
      border-radius: 10px; padding: 12px;
      border: 1px solid var(--border);
      border-left-width: 3px;
      transition: transform 0.2s;
      animation: fadeUp 0.35s ease forwards; opacity: 0;
    }
    .cal-card:hover { transform: translateY(-2px); }
    .cal-card.brazil-game { background: rgba(0,200,81,0.06); }
    .cal-label {
      font-family: 'Bebas Neue', cursive;
      font-size: 10px; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 8px;
    }
    .cal-teams {
      display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
    }
    .cal-team { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
    .cal-flag { font-size: 20px; }
    .cal-name { font-size: 11px; font-weight: 600; text-align: center; }
    .cal-vs {
      font-family: 'Bebas Neue', cursive;
      font-size: 18px; color: var(--muted);
      min-width: 44px; text-align: center;
    }
    .cal-vs.scored { color: var(--gold); font-size: 22px; }
    .cal-venue { font-size: 10px; color: var(--muted); margin-top: 7px; text-align: center; }

    /* ===== BRACKET ===== */
    .bracket-empty {
      text-align: center; padding: 80px 20px;
    }
    .bracket-empty h2 {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px; color: var(--muted); margin-bottom: 10px;
    }
    .bracket-empty p { color: var(--muted); font-size: 15px; margin-top: 6px; }
    .bracket-empty .pct { color: var(--gold); font-weight: 700; font-size: 16px; margin-top: 12px; }
    .champion-display {
      text-align: center; padding: 32px 20px;
      background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
      border-radius: 16px; border: 1px solid rgba(255,215,0,0.25);
      margin-bottom: 24px;
    }
    .champion-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 18px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px;
    }
    .champion-flag { font-size: 52px; }
    .champion-name {
      font-family: 'Bebas Neue', cursive;
      font-size: 44px; color: var(--gold);
      text-shadow: 0 0 40px rgba(255,215,0,0.55); margin-top: 4px;
    }
    .bracket-container { overflow-x: auto; padding-bottom: 16px; }
    .bracket-rounds { display: flex; gap: 20px; min-width: max-content; padding: 8px 0; }
    .bracket-round { display: flex; flex-direction: column; }
    .round-header {
      font-family: 'Bebas Neue', cursive;
      font-size: 13px; letter-spacing: 1px;
      color: var(--gold); text-align: center;
      padding: 6px 12px; margin-bottom: 6px;
      background: rgba(255,215,0,0.07);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 6px;
    }
    .round-matches {
      display: flex; flex-direction: column;
      justify-content: space-around; gap: 8px;
    }
    .bracket-match {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      width: 190px;
    }
    .bracket-team {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 10px; font-size: 12px; font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .bracket-team:last-child { border-bottom: none; }
    .bracket-team.winner { color: var(--gold); background: rgba(255,215,0,0.07); }
    .bracket-team.empty { color: var(--muted); font-style: italic; }
    .bracket-score { margin-left: auto; font-family: 'Bebas Neue', cursive; font-size: 15px; }

    /* ===== SIMULATION ===== */
    .sim-controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px;
      margin-bottom: 20px;
    }
    .sim-controls-top {
      display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .sim-filters {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
      margin-bottom: 10px;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label {
      font-family: 'Bebas Neue', cursive;
      font-size: 12px; letter-spacing: 1px; color: var(--muted);
    }
    .filter-select {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 600;
      padding: 5px 10px; border-radius: 6px; cursor: pointer; outline: none;
    }
    .progress-bar-wrap {
      background: rgba(255,255,255,0.07);
      border-radius: 4px; height: 5px; overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      transition: width 0.4s ease; border-radius: 4px;
    }
    .progress-text { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .progress-text span { color: var(--gold); font-weight: 700; }
    .sim-list { display: flex; flex-direction: column; gap: 7px; }
    .sim-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      animation: fadeUp 0.3s ease forwards; opacity: 0;
    }
    .sim-side {
      display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0;
    }
    .sim-side.right { flex-direction: row-reverse; }
    .sim-tname {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sim-tname.winner { color: var(--gold); }
    .sim-tname.loser  { color: var(--muted); }
    .sim-tname.draw   { color: var(--cyan); }
    .score-area { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .score-input {
      width: 46px; height: 34px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--gold);
      font-family: 'Bebas Neue', cursive; font-size: 20px;
      text-align: center; outline: none; transition: border-color 0.2s;
    }
    .score-input:focus { border-color: var(--gold); }
    .sim-x { font-family: 'Bebas Neue', cursive; font-size: 13px; color: var(--muted); }
    .btn-ok {
      background: rgba(0,200,81,0.14); border: 1px solid var(--green);
      color: var(--green); font-family: 'Bebas Neue', cursive;
      font-size: 14px; padding: 5px 11px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-ok:hover { background: rgba(0,200,81,0.28); }
    .btn-del {
      background: rgba(255,68,68,0.10); border: 1px solid rgba(255,68,68,0.30);
      color: var(--red); font-family: 'Bebas Neue', cursive;
      font-size: 14px; padding: 5px 11px; border-radius: 6px;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    .btn-del:hover { background: rgba(255,68,68,0.24); }
    .sim-meta {
      font-family: 'Bebas Neue', cursive;
      font-size: 10px; color: var(--muted); letter-spacing: 1px;
      flex-shrink: 0;
    }
    .sim-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.25); border-radius: 3px; }
  </style>
</head>

const ROUND2_DATES = ['Jun 15','Jun 15','Jun 19','Jun 16','Jun 17','Jun 17','Jun 18','Jun 18','Jun 19','Jun 16','Jun 17','Jun 18'];
const ROUND3_DATES = ['Jun 23','Jun 23','Jun 24','Jun 24','Jun 25','Jun 25','Jun 26','Jun 26','Jun 23','Jun 24','Jun 25','Jun 26'];

function buildGames() {
  const games = [];
  const letters = Object.keys(GROUPS);
  letters.forEach((g, gi) => {
    // Round 1: 0v1, 2v3
    games.push({id:`${g}-0`, group:g, round:1, date:ROUND1_DATES[gi], tA:0, tB:1});
    games.push({id:`${g}-1`, group:g, round:1, date:ROUND1_DATES[gi], tA:2, tB:3});
    // Round 2: 0v2, 1v3
    games.push({id:`${g}-2`, group:g, round:2, date:ROUND2_DATES[gi], tA:0, tB:2});
    games.push({id:`${g}-3`, group:g, round:2, date:ROUND2_DATES[gi], tA:1, tB:3});
    // Round 3: 0v3, 1v2
    games.push({id:`${g}-4`, group:g, round:3, date:ROUND3_DATES[gi], tA:0, tB:3});
    games.push({id:`${g}-5`, group:g, round:3, date:ROUND3_DATES[gi], tA:1, tB:2});
  });
  return games;
}
const ALL_GAMES = buildGames();

/* ================================================================
   UTILITIES
   ================================================================ */

// Simulation constants (RN02)
const SIM_BASE_GOALS    = 2.6;   // Average total goals per match
const SIM_RAND_MULT     = 1.4;   // Randomness multiplier
const SIM_STRENGTH_BONUS = 1.5;  // Extra goals awarded to the stronger side

function autoSim(tA, tB) {
  const fA = Math.max(1, 101 - tA.ranking);
  const fB = Math.max(1, 101 - tB.ranking);
  const prob = fA / (fA + fB);
  const h = Math.round(Math.random() * SIM_RAND_MULT * SIM_BASE_GOALS / 2 + (Math.random() < prob      ? Math.random() * SIM_STRENGTH_BONUS : 0));
  const a = Math.round(Math.random() * SIM_RAND_MULT * SIM_BASE_GOALS / 2 + (Math.random() < (1-prob) ? Math.random() * SIM_STRENGTH_BONUS : 0));
  return {home: h, away: a};
}

function calcStandings(group, results) {
  const teams = GROUPS[group].teams;
  const st = teams.map((t, i) => ({idx:i, team:t, pts:0, j:0, gf:0, ga:0, sg:0}));
  ALL_GAMES.filter(g => g.group === group).forEach(game => {
    const r = results[game.id];
    if (!r || r.home === '' || r.away === '') return;
    const h = Number(r.home), a = Number(r.away);
    if (isNaN(h) || isNaN(a)) return;
    const sA = st[game.tA], sB = st[game.tB];
    sA.j++; sB.j++;
    sA.gf += h; sA.ga += a; sA.sg += h - a;
    sB.gf += a; sB.ga += h; sB.sg += a - h;
    if (h > a)      { sA.pts += 3; }
    else if (h < a) { sB.pts += 3; }
    else            { sA.pts += 1; sB.pts += 1; }
  });
  return st.sort((x, y) => y.pts - x.pts || y.sg - x.sg || y.gf - x.gf);
}

function simKO(tA, tB) {
  if (!tA || !tB) return null;
  const fA = Math.max(1, 101 - (tA.ranking || 50));
  const fB = Math.max(1, 101 - (tB.ranking || 50));
  const prob = fA / (fA + fB);
  let sA = Math.round(Math.random() * 2.6);
  let sB = Math.round(Math.random() * 2.6);
  // RN05: draws in knockout resolved by penalty shootout (50/50 weighted by strength)
  if (sA === sB) { if (Math.random() < prob) sA++; else sB++; }
  return {sA, sB, winner: sA > sB ? tA : tB};
}

function buildBracket(results) {
  const letters = Object.keys(GROUPS);
  const allDone = letters.every(g =>
    ALL_GAMES.filter(x => x.group === g).every(x => {
      const r = results[x.id];
      return r && r.home !== '' && r.away !== '';
    })
  );
  if (!allDone) return null;

  const standings = {};
  letters.forEach(g => { standings[g] = calcStandings(g, results); });

  // Collect thirds, rank by pts > sg > gf
  // Collect thirds (all groups guaranteed to have 4 teams → index 2 always exists)
  const thirds = letters.map(g => ({...standings[g][2], group: g}))
    .sort((a, b) => b.pts - a.pts || b.sg - a.sg || b.gf - a.gf);
  const best8 = thirds.slice(0, 8);

  // R32 pairings: 1st[A-F] vs 2nd[G-L], 1st[G-L] vs 2nd[A-F]  => 12 matches
  //               thirds[0-3] vs thirds[4-7]                     =>  4 matches
  //               Total = 16 matches
  const r32 = [];
  const firstHalf  = letters.slice(0, 6);  // A-F
  const secondHalf = letters.slice(6, 12); // G-L
  firstHalf.forEach((g1, i) => {
    const g2 = secondHalf[i];
    r32.push({tA:{...standings[g1][0].team, group:g1}, tB:{...standings[g2][1].team, group:g2}});
  });
  secondHalf.forEach((g1, i) => {
    const g2 = firstHalf[i];
    r32.push({tA:{...standings[g1][0].team, group:g1}, tB:{...standings[g2][1].team, group:g2}});
  });
  for (let i = 0; i < 4; i++) {
    r32.push({tA: best8[i].team, tB: best8[i+4].team});
  }

  const r32r = r32.map(m => simKO(m.tA, m.tB));

  // R16: winners of r32[0-1] play, r32[2-3], etc.
  const r16 = [];
  for (let i = 0; i < 16; i += 2) {
    r16.push({tA: r32r[i]?.winner, tB: r32r[i+1]?.winner});
  }
  const r16r = r16.map(m => simKO(m.tA, m.tB));

  // QF
  const qf = [];
  for (let i = 0; i < 8; i += 2) {
    qf.push({tA: r16r[i]?.winner, tB: r16r[i+1]?.winner});
  }
  const qfr = qf.map(m => simKO(m.tA, m.tB));

  // SF
  const sf = [];
  for (let i = 0; i < 4; i += 2) {
    sf.push({tA: qfr[i]?.winner, tB: qfr[i+1]?.winner});
  }
  const sfr = sf.map(m => simKO(m.tA, m.tB));

  // 3rd place: losers of SF
  const l1 = sfr[0] ? (sfr[0].sA > sfr[0].sB ? sf[0].tB : sf[0].tA) : null;
  const l2 = sfr[1] ? (sfr[1].sA > sfr[1].sB ? sf[1].tB : sf[1].tA) : null;
  const tpr = simKO(l1, l2);

  // Final
  const fr = simKO(sfr[0]?.winner, sfr[1]?.winner);

  return {
    r32:  r32.map((m,i)  => ({...m, r: r32r[i]})),
    r16:  r16.map((m,i)  => ({...m, r: r16r[i]})),
    qf:   qf.map((m,i)   => ({...m, r: qfr[i]})),
    sf:   sf.map((m,i)   => ({...m, r: sfr[i]})),
    tp:   {tA: l1, tB: l2, r: tpr},
    fin:  {tA: sfr[0]?.winner, tB: sfr[1]?.winner, r: fr},
    champ: fr?.winner,
  };
}

// ---- Simulation View ----
function SimulationView({results, setResults}) {
  const [statusF, setStatusF] = useState('all');
  const [groupF,  setGroupF]  = useState('all');
  const [pending, setPending] = useState({});

  const done = useMemo(() =>
    Object.values(results).filter(r => r && r.home !== '' && r.away !== '').length,
    [results]
  );

  const filtered = useMemo(() => ALL_GAMES.filter(game => {
    const r  = results[game.id];
    const ok = r && r.home !== '' && r.away !== '';
    if (statusF==='played'  && !ok) return false;
    if (statusF==='pending' &&  ok) return false;
    if (groupF!=='all' && game.group !== groupF) return false;
    return true;
  }), [statusF, groupF, results]);

  const getVal = (id, side) => {
    const p = pending[id];
    if (p && p[side] !== undefined) return p[side];
    const r = results[id];
    return r ? (r[side] ?? '') : '';
  };

  const onInput = (id, side, val) => {
    if (!/^[0-9]*$/.test(val)) return;
    setPending(p => ({...p, [id]:{...(p[id]||{}), [side]:val}}));
  };

  const onConfirm = id => {
    const p = pending[id] || {};
    const r = results[id] || {};
    const h = p.home !== undefined ? p.home : r.home ?? '';
    const a = p.away !== undefined ? p.away : r.away ?? '';
    if (h !== '' && a !== '') {
      setResults(prev => ({...prev, [id]:{home:Number(h), away:Number(a)}}));
      setPending(prev => {const n={...prev}; delete n[id]; return n;});
    }
  };

  const onDelete = id => {
    setResults(prev => {const n={...prev}; delete n[id]; return n;});
    setPending(prev => {const n={...prev}; delete n[id]; return n;});
  };

  const autoAll = () => {
    const nr = {};
    ALL_GAMES.forEach(game => {
      const tA = GROUPS[game.group].teams[game.tA];
      const tB = GROUPS[game.group].teams[game.tB];
      const r  = autoSim(tA, tB);
      nr[game.id] = {home:r.home, away:r.away};
    });
    setResults(nr);
    setPending({});
  };

  const clearAll = () => { setResults({}); setPending({}); };

  const pct = Math.round(done / 72 * 100);

  return React.createElement('div', null,
    // Controls
    React.createElement('div', {className:'sim-controls'},
      React.createElement('div', {className:'sim-controls-top'},
        React.createElement('button', {className:'btn btn-gold', onClick:autoAll}, '⚡ AUTO-SIMULAR TUDO'),
        React.createElement('button', {className:'btn btn-outline', onClick:clearAll}, '🗑️ LIMPAR TUDO'),
      ),
      React.createElement('div', {className:'sim-filters'},
        React.createElement('div', {className:'filter-group'},
          React.createElement('span', {className:'filter-label'}, 'STATUS:'),
          React.createElement('select', {
            className:'filter-select', value:statusF,
            onChange:e=>setStatusF(e.target.value),
          },
            React.createElement('option', {value:'all'},     'Todos'),
            React.createElement('option', {value:'played'},  'Jogados'),
            React.createElement('option', {value:'pending'}, 'Pendentes'),
          ),
        ),
        React.createElement('div', {className:'filter-group'},
          React.createElement('span', {className:'filter-label'}, 'GRUPO:'),
          React.createElement('select', {
            className:'filter-select', value:groupF,
            onChange:e=>setGroupF(e.target.value),
          },
            React.createElement('option', {value:'all'}, 'Todos'),
            ...Object.keys(GROUPS).map(g =>
              React.createElement('option', {key:g, value:g}, `Grupo ${g}`)
            ),
          ),
        ),
      ),
      React.createElement('div', {className:'progress-bar-wrap'},
        React.createElement('div', {className:'progress-bar', style:{width:`${pct}%`}}),
      ),
      React.createElement('div', {className:'progress-text'},
        React.createElement('span', null, done),
        ` / 72 jogos simulados (`,
        React.createElement('span', null, `${pct}%`),
        `)`,
      ),
    ),

    // Game list
    React.createElement('div', {className:'sim-list'},
      filtered.map((game, idx) => {
        const teams = GROUPS[game.group].teams;
        const tA = teams[game.tA], tB = teams[game.tB];
        const r  = results[game.id];
        const ok = r && r.home !== '' && r.away !== '';
        const color = GROUP_COLORS[game.group];
        const hv = getVal(game.id, 'home');
        const av = getVal(game.id, 'away');

        let hCls = 'sim-tname', aCls = 'sim-tname';
        if (ok) {
          if      (r.home > r.away) { hCls += ' winner'; aCls += ' loser';  }
          else if (r.home < r.away) { aCls += ' winner'; hCls += ' loser';  }
          else                      { hCls += ' draw';   aCls += ' draw';   }
        }

        return React.createElement('div', {
          key:game.id,
          className:`sim-row${ok?' played':''}`,
          style:{borderLeftColor:color, animationDelay:`${(idx%25)*28}ms`},
        },
          // Team A
          React.createElement('div', {className:'sim-side'},
            React.createElement('span', {style:{fontSize:'18px'}}, tA.flag),
            React.createElement('span', {className:hCls}, tA.name),
          ),
          // Score inputs
          React.createElement('div', {className:'score-area'},
            React.createElement('input', {
              className:'score-input', type:'text',
              inputMode:'numeric', maxLength:2, placeholder:'-',
              value:hv,
              onChange:e=>onInput(game.id,'home',e.target.value),
              onKeyDown:e=>{ if(e.key==='Enter') onConfirm(game.id); },
            }),
            React.createElement('span', {className:'sim-x'}, 'X'),
            React.createElement('input', {
              className:'score-input', type:'text',
              inputMode:'numeric', maxLength:2, placeholder:'-',
              value:av,
              onChange:e=>onInput(game.id,'away',e.target.value),
              onKeyDown:e=>{ if(e.key==='Enter') onConfirm(game.id); },
            }),
          ),
          // Team B
          React.createElement('div', {className:'sim-side right'},
            React.createElement('span', {className:aCls}, tB.name),
            React.createElement('span', {style:{fontSize:'18px'}}, tB.flag),
          ),
          // Actions
          React.createElement('div', {className:'sim-actions'},
            React.createElement('span', {className:'sim-meta'}, `G-${game.group} R${game.round}`),
            React.createElement('button', {className:'btn-ok', onClick:()=>onConfirm(game.id)}, '✓'),
            ok && React.createElement('button', {className:'btn-del', onClick:()=>onDelete(game.id)}, '✕'),
          ),
        );
      })
    ),
  );
}

/* ================================================================
   APP
   ================================================================ */

function App() {
  const [tab,     setTab]     = useState('groups');
  const [results, setResults] = useState({});

  return React.createElement('div', null,
    React.createElement(Header, {tab, setTab}),
    React.createElement('main', {className:'main'},
      tab==='groups'     && React.createElement(GroupsView,     {results, setResults}),
      tab==='calendar'   && React.createElement(CalendarView,   {results}),
      tab==='bracket'    && React.createElement(BracketView,    {results}),
      tab==='simulation' && React.createElement(SimulationView, {results, setResults}),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
