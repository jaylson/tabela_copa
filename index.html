/** RN01 — Compute standings for one group from current results */
function calcStandings(gk) {
  const teams = GROUPS[gk].teams.map((t, i) =>
    Object.assign({}, t, {idx:i, j:0, v:0, e:0, d:0, gf:0, gc:0, pts:0, sg:0})
  );
  for (let mi = 1; mi <= 6; mi++) {
    const res = state.results[gk + "-" + mi];
    if (!res) continue;
    const gm = GAMES[gk + "-" + mi];
    const ht = teams[gm.homeIdx], at = teams[gm.awayIdx];
    const h = res.home, a = res.away;
    ht.j++; at.j++;
    ht.gf += h; ht.gc += a; ht.sg += h - a;
    at.gf += a; at.gc += h; at.sg += a - h;
    if (h > a)      { ht.v++; ht.pts += 3; at.d++; }
    else if (h < a) { at.v++; at.pts += 3; ht.d++; }
    else            { ht.e++; at.e++; ht.pts++; at.pts++; }
  }
  teams.sort((a, b) => (b.pts - a.pts) || (b.sg - a.sg) || (b.gf - a.gf));
  return teams;
}

// Simulation formula constants (RN02)
const SIM_AVG_GOALS   = 2.6;  // avg total goals per game (~2.6 per FIFA stats)
const SIM_VARIANCE    = 1.4;  // multiplier for base random component
const SIM_BONUS_GOALS = 1.5;  // extra goals bonus awarded to the favored side
const TOURNAMENT_YEAR = 2026; // year used in date construction

/** RN02 — Auto-simulate one game using FIFA ranking weights.
 *  Returns { home, away } goals calculated from ranking strength differential. */
function simGame(homeRank, awayRank) {
  const fh = Math.max(1, 101 - homeRank);
  const fa = Math.max(1, 101 - awayRank);
  const ph = fh / (fh + fa); // probability home wins based on rank gap
  const base = SIM_VARIANCE * SIM_AVG_GOALS / 2; // base random component per team (~1.82)
  const homeBonus = Math.random() < ph       ? Math.random() * SIM_BONUS_GOALS : 0;
  const awayBonus = Math.random() < (1 - ph) ? Math.random() * SIM_BONUS_GOALS : 0;
  const gh = Math.round(Math.random() * base + homeBonus);
  const ga = Math.round(Math.random() * base + awayBonus);
  return { home: gh, away: ga };
}

// Auto-simulate all 72 group games (skips already-set results)
function autoSimAll() {
  Object.values(GAMES).forEach(g => {
    if (!state.results[g.id]) state.results[g.id] = simGame(g.home.rank, g.away.rank);
  });
}

// Clear all results and bracket
function clearAll() { state.results = {}; state.bracket = null; }

// Count completed group games
function doneCount() { return Object.keys(state.results).length; }

/** RN01/RN03 — Get qualified teams: top-2 per group + best 8 thirds */
function getQualified() {
  const firsts = {}, seconds = {}, thirds = [];
  Object.keys(GROUPS).forEach(gk => {
    const s = calcStandings(gk);
    firsts[gk]  = Object.assign({}, s[0], { pos:"1", group:gk });
    seconds[gk] = Object.assign({}, s[1], { pos:"2", group:gk });
    if (s[2]) thirds.push(Object.assign({}, s[2], { pos:"3", group:gk }));
  });
  // RN03: sort thirds by pts, sg, gf
  thirds.sort((a, b) => (b.pts - a.pts) || (b.sg - a.sg) || (b.gf - a.gf));
  return { firsts, seconds, best8: thirds.slice(0, 8) };
}

/** RN04 — Fixed R32 bracket (no same-group clashes) */
const R32_PAIRS = [
  ["1A","2H"],["1B","2I"],["1C","2J"],["1D","2K"],
  ["1E","2L"],["1F","2G"],["1G","2F"],["1H","2E"],
  ["1I","2D"],["1J","2C"],["1K","2B"],["1L","2A"],
  ["3rd1","3rd2"],["3rd3","3rd4"],["3rd5","3rd6"],["3rd7","3rd8"]
];

/** RN05 — Simulate knockout match (random winner) */
function koSim(home, away) {
  return { home, away, winner: Math.random() < 0.5 ? home : away };
}

const TBD_TEAM = { name:"TBD", flag:"", rank:50 };

/** Build and simulate full bracket */
function buildBracket() {
  const { firsts, seconds, best8 } = getQualified();
  function resolve(lbl) {
    if (lbl[0] === "1") return firsts[lbl[1]]  || TBD_TEAM;
    if (lbl[0] === "2") return seconds[lbl[1]] || TBD_TEAM;
    const idx = parseInt(lbl.replace("3rd","")) - 1;
    return best8[idx] || TBD_TEAM;
  }
  const R32 = R32_PAIRS.map(([hl, al]) => koSim(resolve(hl), resolve(al)));
  function nextRound(ms) {
    const out = [];
    for (let i = 0; i < ms.length; i += 2) out.push(koSim(ms[i].winner, ms[i+1].winner));
    return out;
  }
  const R16 = nextRound(R32), QF = nextRound(R16), SF = nextRound(QF), FIN = nextRound(SF);
  const l0 = SF[0].home === SF[0].winner ? SF[0].away : SF[0].home;
  const l1 = SF[1].home === SF[1].winner ? SF[1].away : SF[1].home;
  return { R32, R16, QF, SF, FIN, THIRD: [koSim(l0, l1)] };
}

const PT_DAYS   = ["DOMINGO","SEGUNDA-FEIRA","TERÇA-FEIRA","QUARTA-FEIRA","QUINTA-FEIRA","SEXTA-FEIRA","SÁBADO"];
const PT_MONTHS = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
const MMAP      = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

function fmtDate(ds) {
  const [mon, day] = ds.split(" ");
  const monthIdx = MMAP[mon];
  if (monthIdx === undefined) return ds; // guard against unknown month strings
  const d = new Date(TOURNAMENT_YEAR, monthIdx, parseInt(day));
  return PT_DAYS[d.getDay()] + ", " + day + " DE " + PT_MONTHS[d.getMonth()];
}
function dateVal(ds) { const [m,d] = ds.split(" "); return (MMAP[m] !== undefined ? MMAP[m] : 5)*100+parseInt(d); }

    html += `<div style="overflow-x:auto;padding-bottom:.75rem"><div style="display:flex;gap:1.25rem;min-width:max-content;padding:.5rem 0">`;
    html += `<div style="display:flex;flex-direction:column;gap:4px;min-width:172px">`;

    });
    html += `</div></div></div>`;
    return html;

  // Full bracket with all results
  const b   = state.bracket;

  function renderPhase(title, matches) {
    let ph = `<div style="display:flex;flex-direction:column;gap:4px;min-width:172px"><div class="b-phase-title">${title}</div>`;
    matches.forEach(m => {
      const hw = m.winner === m.home;
      ph += `<div class="b-match">`
        + `<div class="b-team${hw ? " winner" : ""}">${crestImg(m.home, 18)} ${m.home.name}</div>`
        + `<hr class="b-sep">`
        + `<div class="b-team${!hw ? " winner" : ""}">${crestImg(m.away, 18)} ${m.away.name}</div>`
        + `</div>`;
    });
    return ph + `</div>`;
  }
  html += `<div style="overflow-x:auto;padding-bottom:.75rem"><div style="display:flex;gap:1.25rem;min-width:max-content;padding:.5rem 0">`
    + renderPhase("FASE DE 32 (R32)", b.R32)
    + renderPhase("OITAVAS-DE-FINAL (R16)", b.R16)
    + renderPhase("QUARTAS-DE-FINAL", b.QF)
    + renderPhase("SEMIFINAL", b.SF)
    + renderPhase("3&ordm; LUGAR", b.THIRD)
    + renderPhase("FINAL", b.FIN)
    + `</div></div>`;
  return html;
}

    + `</div>`;
  // Progress bar
  html += `<div style="background:#fff;border-radius:.75rem;border:1px solid #e2e8f0;padding:.875rem 1rem;margin-bottom:1rem;box-shadow:0 1px 2px rgba(0,0,0,.04)">`
    + `<div style="display:flex;justify-content:space-between;font-size:.8rem;color:#64748b;margin-bottom:.5rem">`
    + `<span>${total} de 72 jogos simulados</span><span style="font-weight:700;color:#1e293b">${pct}%</span></div>`
    + `<div style="background:#f1f5f9;border-radius:9999px;height:6px;overflow:hidden">`
    + `<div class="prog-fill" style="width:${pct}%"></div></div></div>`;
  // Filter + sort
  let games = Object.values(GAMES);
  if (state.simFilter.group !== "all")   games = games.filter(g => g.group === state.simFilter.group);
  if (state.simFilter.status === "done")    games = games.filter(g =>  state.results[g.id]);
  if (state.simFilter.status === "pending") games = games.filter(g => !state.results[g.id]);
  games.sort((a, b) => dateVal(a.date) - dateVal(b.date) || a.id.localeCompare(b.id));
  // Game rows
  html += `<div style="display:flex;flex-direction:column;gap:.5rem">`;
  games.forEach(g => {
    const res    = state.results[g.id];
    const hv     = res ? res.home : "";
    const av     = res ? res.away : "";
    const isDraw = res && res.home === res.away;
    const rowCls = res ? (isDraw ? " draw" : " done") : "";
    let hcls = "", acls = "";
    if (res && !isDraw) {
      hcls = res.home > res.away ? " win" : " lose";
      acls = res.away > res.home ? " win" : " lose";
    }
    html += `<div class="sim-row${rowCls}">`
      + `<div style="display:flex;align-items:center;gap:6px;flex:1">`
      + `<span style="font-size:1.2rem">${crestImg(g.home, 22)}</span>`
      + `<span class="sim-tn${hcls}">${g.home.name}</span>`
      + `</div>`
      + `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;min-width:130px">`
      + `<span style="font-size:.6rem;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;font-weight:600">GRP ${g.group} &middot; ROD.${g.round}</span>`
      + `<div style="display:flex;align-items:center;gap:4px">`
      + `<input class="sc" type="number" min="0" max="20" value="${hv}" data-gid="${g.id}" data-role="h" placeholder="0" aria-label="Gols ${g.home.name}">`
      + `<span style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#94a3b8">&ndash;</span>`
      + `<input class="sc" type="number" min="0" max="20" value="${av}" data-gid="${g.id}" data-role="a" placeholder="0" aria-label="Gols ${g.away.name}">`
      + `</div></div>`
      + `<div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end;flex-direction:row-reverse">`
      + `<span style="font-size:1.2rem">${crestImg(g.away, 22)}</span>`
      + `<span class="sim-tn${acls}">${g.away.name}</span>`
      + `</div>`
      + `<div style="display:flex;gap:4px">`
      + `<button class="btn-ok" data-action="confirm" data-gid="${g.id}">&#10003; OK</button>`
      + (res ? `<button class="btn-x" data-action="remove" data-gid="${g.id}">&#10005;</button>` : "")
      + `</div></div>`;
  });
  html += `</div>`;
  return html;
}

// ============================================================
// MODAL — Group Games
// ============================================================
function openGroupModal(gk) {
  const gd = GROUPS[gk];
  const modal   = document.getElementById("group-modal");
  const label   = document.getElementById("modal-group-label");
  const badge   = document.getElementById("modal-group-badge");
  const list    = document.getElementById("modal-games-list");

  label.textContent = "GRUPO " + gk + " — JOGOS";
  label.style.color = gd.color;
  badge.innerHTML   = gd.brazil ? `<span class="brazil-badge">&#127463;&#127479; GRUPO DO BRASIL</span>` : "";

  let html = "";
  for (let mi = 1; mi <= 6; mi++) {
    const gm  = GAMES[gk + "-" + mi];
    const res = state.results[gm.id];
    const sc  = res
      ? `<span class="modal-score">${res.home}&ndash;${res.away}</span>`
      : `<span class="modal-score pnd">vs</span>`;
    html += `<div class="modal-game-row">`
      + `<div class="modal-meta">&#128197; ${gm.date}<br>&#128336; ${gm.time}</div>`
      + `<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0">${crestImg(gm.home)} <span style="font-size:.8125rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${gm.home.name}</span></div>`
      + sc
      + `<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;justify-content:flex-end"><span style="font-size:.8125rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${gm.away.name}</span> ${crestImg(gm.away)}</div>`
      + `</div>`;
  }
  list.innerHTML = html;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
}

function closeGroupModal() {
  document.getElementById("group-modal").classList.add("hidden");
  document.body.style.overflow = "";
}

// ============================================================
// RENDER — Statistics View
// ============================================================
function renderStats() {
  return `<div style="max-width:720px;margin:0 auto">`
    + `<div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.08em;color:#1e293b;margin-bottom:1rem">&#128202; Estat&iacute;sticas</div>`
    + `<div class="card" style="margin-bottom:1.5rem">`
    + `<div style="padding:.75rem 1rem;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px">`
    + `<span style="font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.08em;color:#f59e0b">&#9917; Artilheiros</span>`
    + `</div>`
    + `<div style="padding:1.5rem 1rem;text-align:center">`
    + `<p style="font-size:.9375rem;color:#64748b;font-style:italic">Em breve, assim que sa&iacute;rem as listas oficiais, teremos aqui as estat&iacute;sticas.</p>`
    + `</div>`
    + `<table class="standings-table" style="opacity:.45;pointer-events:none">`
    + `<thead><tr>`
    + `<th>#</th><th style="text-align:left">Jogador</th><th>Sele&ccedil;&atilde;o</th><th>Gols</th><th>Jogos</th>`
    + `</tr></thead>`
    + `<tbody>`
    + `<tr><td><span style="font-size:.65rem;color:#94a3b8;font-weight:700">1</span></td><td style="text-align:left;font-weight:600;color:#cbd5e1">&mdash;</td><td style="color:#cbd5e1">&mdash;</td><td><strong style="color:#cbd5e1">&mdash;</strong></td><td style="color:#cbd5e1">&mdash;</td></tr>`.repeat(5)
    + `</tbody>`
    + `</table>`
    + `</div>`;
}

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  document.querySelectorAll(".nav-tab").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === state.activeTab);
  });
  let html = `<div class="fade-up">`;
  if      (state.activeTab === "groups")     html += renderGroups();
  else if (state.activeTab === "calendar")   html += renderCalendar();
  else if (state.activeTab === "bracket")    html += renderBracket();
  else if (state.activeTab === "simulation") html += renderSimulation();
  else if (state.activeTab === "stats")      html += renderStats();
  html += `</div>`;
  document.getElementById("app").innerHTML = html;
}

// ============================================================
// EVENT HANDLING — All delegated on #app and #nav
// ============================================================

/** Confirm a game: read inputs from DOM, save result, re-render */
function confirmGame(gid) {
  const hi = document.querySelector(`.sc[data-gid="${gid}"][data-role="h"]`);
  const ai = document.querySelector(`.sc[data-gid="${gid}"][data-role="a"]`);
  if (!hi || !ai) return;
  const h = parseInt(hi.value), a = parseInt(ai.value);
  if (isNaN(h) || isNaN(a) || h < 0 || a < 0) return;
  state.results[gid] = { home:h, away:a };
  state.bracket = null; // invalidate cached bracket
  render();
}

document.getElementById("app").addEventListener("click", function(e) {
  const t = e.target.closest("[data-action]");
  if (!t) return;
  const action = t.dataset.action;
  if (action === "open-group-modal") {
    openGroupModal(t.dataset.group);
  } else if (action === "auto-sim-all") {
    autoSimAll(); state.bracket = null; render();
  } else if (action === "clear-all") {
    clearAll(); render();
  } else if (action === "confirm") {
    confirmGame(t.dataset.gid);
  } else if (action === "remove") {
    delete state.results[t.dataset.gid]; state.bracket = null; render();
  } else if (action === "sim-bracket") {
    state.bracket = buildBracket(); render();
  }
});

// Enter key in score input confirms the game (no focus-loss while typing)
document.getElementById("app").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && e.target.matches(".sc")) confirmGame(e.target.dataset.gid);
});

// Filter dropdowns
document.getElementById("app").addEventListener("change", function(e) {
  if (e.target.matches("[data-filter]")) {
    state.simFilter[e.target.dataset.filter] = e.target.value;
    render();
  }
});

// Tab navigation
document.getElementById("nav").addEventListener("click", function(e) {
  const btn = e.target.closest(".nav-tab");
  if (btn) { state.activeTab = btn.dataset.tab; render(); }
});

// Modal close events
document.getElementById("modal-close-btn").addEventListener("click", closeGroupModal);
document.getElementById("group-modal").addEventListener("click", function(e) {
  if (e.target === this) closeGroupModal();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && !document.getElementById("group-modal").classList.contains("hidden")) closeGroupModal();
});

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
